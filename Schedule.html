<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Document</title>
    <style>
        body {
            overflow: hidden;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 14px 20px;
            border-radius: 50px;
            color: #c9c9c9;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .nav-link i {
            font-size: 22px;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateX(8px);
        }

        .nav-link.active {
            background-color: transparent;
            color: #fff;
        }

        .nav-link.active:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .nav.flex-column {
            gap: 6px;
        }

        .bell:hover,
        .mooon:hover {
            color: #fff !important;
        }

        #Main_content {
            background-color: #09090B;
            overflow-y: auto;
            font-size: 1.08rem;
        }

        #Main_content h1 {
            font-size: 2.75rem;
        }

        #Main_content h2 {
            font-size: 2.1rem;
        }

        #Main_content h5 {
            font-size: 1.4rem;
        }

        #Main_content .fs-5 {
            font-size: 1.35rem !important;
        }

        #Main_content .fs-6 {
            font-size: 1.1rem !important;
        }

        .stat-card {
            background-color: #18181B;
            border: 1px solid rgba(128, 128, 128, 0.15);
            border-radius: 18px;
            padding: 22px 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
            cursor: pointer;
        }

        .stat-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .panel-card {
            background-color: #18181B;
            border: 1px solid rgba(128, 128, 128, 0.15);
            border-radius: 18px;
        }

        .btn-export {
            background-color: rgba(255, 255, 255, 0.06);
            color: #d4d4d4;
            border: none;
        }

        .btn-export:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-announce {
            background-color: #f0b429;
            color: #18181B;
            border: none;
            font-weight: 600;
        }

        .btn-announce:hover {
            background-color: #ffc94d;
            color: #18181B;
        }

        .student-row {
            border-bottom: 1px solid rgba(128, 128, 128, 0.12);
            transition: background-color 0.2s ease;
        }

        .student-row:last-child {
            border-bottom: none;
        }

        .student-row.row-hover:hover {
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .status-pill {
            font-size: 14px;
            padding: 4px 14px;
            border-radius: 50px;
        }

        .status-enrolled {
            background-color: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .event-date-box {
            width: 52px;
            height: 56px;
            border-radius: 10px;
            text-align: center;
            flex-shrink: 0;
        }

        .event-date-box.yellow {
            background-color: rgba(240, 180, 41, 0.12);
        }

        .event-date-box.yellow span:first-child {
            color: #f0b429;
        }

        .event-date-box.blue {
            background-color: rgba(59, 130, 246, 0.12);
        }

        .event-date-box.blue span:first-child {
            color: #60a5fa;
        }

        /* ===== Teacher / Faculty Directory cards ===== */
        .teacher-card {
            background-color: #18181B;
            border: 1px solid rgba(128, 128, 128, 0.15);
            border-radius: 18px;
            padding: 26px 26px 22px 26px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .teacher-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .teacher-icon-box {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }

        .years-badge {
            background-color: rgba(255, 255, 255, 0.08);
            color: #e4e4e7;
            font-size: 13px;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 50px;
        }

        .teacher-subject {
            color: #f0b429;
            font-weight: 500;
        }

        .teacher-card hr {
            border-color: rgba(128, 128, 128, 0.18);
            margin: 18px 0 14px 0;
            opacity: 1;
        }

        .teacher-card .view-profile {
            color: #a1a1aa;
            font-size: 0.95rem;
        }

        .teacher-card .schedule-link {
            color: #4ade80;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .teacher-card .schedule-link:hover {
            color: #6ee7a0;
        }
    </style>
</head>

<body>
    <div style="width: 1300; height: 100vh; background-color: #09090B;" class="d-flex">
        <div id="Left_bar" class="h-100 "
            style="background-color: #18181B; width: 23%; border-right: 0.5px rgba(78, 77, 77, 0.304) solid;">
            <div id="top" class="d-flex w-100 justify-content-center align-items-center gap-4"
                style="height: 15%; border-bottom: 1px solid rgba(128, 128, 128, 0.323);">
                <img src="https://i.pinimg.com/736x/2b/8c/a2/2b8ca299a1a4b633c00f720c33afd480.jpg" width="50px"
                    height="50px" class="rounded-4" alt="">
                <div class="me-4" style="">
                    <label class="text-light fs-2 fw-bold" style="margin-bottom: -7px;">AcademiaPro</label><br>
                    <label style="color: rgba(194, 189, 189, 0.759);" for="">School Management</label>
                </div>
            </div>
            <div id="top" class="d-flex w-100  align-items-center gap-4 ps-5"
                style="height: 13%; border-bottom: 1px solid rgba(128, 128, 128, 0.323);">
                <img src="teacher.png" width="40px" height="40px" class="rounded-4" alt="">
                <div class="" style="">
                    <label class="text-light fs-4 fw-medium" style="margin-bottom: -7px;">Mr. Alex Rivera</label><br>
                    <label style="color: rgb(135, 217, 135);" class="fw-medium" for="">Principle • Admin</label>
                </div>
            </div>
            <ul class="nav flex-column flex-nowrap d-flex flex-grow-1 overflow-auto p-2 w-100 fs-4"
                style="height: 57%;">
                <li class="nav-item"><a class="nav-link active text-light" href="index.html"><i
                            class='bx bx-tachometer'></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link text-light" href="Students.html"><i
                            class='bx bx-group'></i>Students</a>
                </li>
                <li class="nav-item"><a class="nav-link text-light" href="Teachers.html"><i
                            class='bx bx-chalkboard'></i>Teachers</a></li>
                <li class="nav-item"><a class="nav-link text-light" href="Classes.html"><i
                            class='bx bx-book'></i>Classes</a></li>
                <li class="nav-item"><a class="nav-link text-light" href="Schedule.html"><i
                            class='bx bx-calendar'></i>Schedule</a>
                </li>
                <li class="nav-item"><a class="nav-link text-light" href="Attendence.html"><i
                            class='bx bx-clipboard'></i>Attendance</a></li>
                <li class="nav-item"><a class="nav-link text-light" href="Grades.html"><i
                            class='bx bxs-graduation'></i>Grades</a>
                </li>
                <li class="nav-item"><a class="nav-link text-light" href="Report.html"><i
                            class='bx bx-bar-chart-alt-2'></i>Reports</a></li>
            </ul>
            <div id="top" class="d-flex w-100 justify-content-center align-items-center gap-4"
                style="height: 15%; border-top: 1px solid rgba(128, 128, 128, 0.323);">
                <button type="button" class="btn fw-medium fs-5 w-75 h-50 rounded-4"
                    style="background-color: rgba(78, 77, 77, 0.304); color: rgba(194, 189, 189, 0.759);"
                    data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <i class='bx bx-log-out' style="width: 30px; color: rgba(194, 189, 189, 0.759);"></i> lockout
                </button>
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content" style="background-color: #18181B;">
                            <div class="modal-header border-0">
                                <h1 class="modal-title fs-5 text-light fw-bold" id="exampleModalLabel">Lock Out</h1>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <label class="text-light" for="">Sign out of AcademiaPro?</label>
                            </div>
                            <div class="modal-footer border-0">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">OK</button>
                                <button type="button" class="btn btn-primary">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="d-flex flex-column" style="width: 77%; height: 100vh;">
            <div id="Nav_bar" class="d-flex align-items-center justify-content-center"
                style="background-color: #18181B; width: 100%; height: 80px; flex-shrink: 0; border-bottom: 0.5px rgba(78, 77, 77, 0.304) solid;">
                <div class="h-100 w-100 d-flex align-items-center ms-5 position-relative">
                    <label class="h-75 rounded-5 bg-dark" style="width: 70%; border: 1px solid rgba(95, 94, 94, 0.304);"
                        for=""></label>
                    <i class='bx bx-search-alt-2 text-secondary'
                        style="position: absolute; left: 30px; font-size: 25px;"></i>
                    <input class="position-absolute border border-0 bg-transparent fs-5 text-secondary br"
                        style="left: 60px; outline: none; box-shadow: none;" type="text"
                        placeholder="Search Students, classes...">
                </div>
                <div class="d-flex align-items-center gap-5 me-5">
                    <div class="position-relative" style="">
                        <label class="rounded-circle bg-danger position-absolute text-center text-light"
                            style="width: 20px; height: 20px; left: 15px; font-size: 12px; line-height: 20px;"
                            for="">7</label>
                        <a href="" class="bell text-secondary" style="font-size: 33px;"><i class='bx bxs-bell'></i></a>
                    </div>
                    <div class="text-white d-flex" style="width: 150px;">
                        <div class="">
                            <label class="fw-bold">Sareh Chen</label>
                            <label class="text-secondary" style="font-size: 13px;">Class 10A • Today</label>
                        </div>
                        <img src="https://i.pinimg.com/1200x/c9/70/79/c9707949e969fd0c80bb6d3c6eae2ae7.jpg"
                            class="bg-body rounded-circle mt-1 " style="width: 40px; height: 40px;">
                    </div>
                    <div class="text-white d-flex">
                        <a href="" class="mooon text-secondary fs-2 ps-5" style="border-left: 1px solid gray;"><i
                                class='bx bxs-moon'></i></a>
                    </div>
                </div>
            </div>

            <div id="Main_content" class="flex-grow-1 p-5 text-white">
                <h1 class="fw-bold text-light mb-4">School Schedule</h1>
                <p class="fs-4 text-secondary">Interactive timetable and scheduling system.</p>
            </div>
        </div>
    </div>
</body>

</html>
